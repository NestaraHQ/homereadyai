     1. Open your site's index.html in Cursor or VS Code
     2. Press Ctrl+F (or Cmd+F on Mac) and search for:  </body>
     3. Click just BEFORE that </body> line
     4. Paste this entire file contents there
     5. Save the file
     6. Deploy to Netlify
     
     THAT'S IT. No other changes needed.

<div id="hr-popup-overlay" style="
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.55);
  z-index:9999;
  align-items:center;
  justify-content:center;
  padding:1rem;
" onclick="hrClosePopup(event)">

  <div style="
    background:#ffffff;
    border-radius:16px;
    padding:2rem 2rem 1.75rem;
    max-width:420px;
    width:100%;
    position:relative;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  " onclick="event.stopPropagation()">

    <button onclick="hrDismiss()" style="
      position:absolute;
      top:14px;
      right:16px;
      background:none;
      border:none;
      font-size:22px;
      cursor:pointer;
      color:#aaa;
      line-height:1;
      padding:4px;
    ">×</button>

    <div style="
      width:48px;height:48px;
      background:#EBF4FF;
      border-radius:12px;
      display:flex;align-items:center;justify-content:center;
      font-size:22px;
      margin-bottom:1rem;
    ">🏠</div>

    <h2 style="
      font-size:20px;
      font-weight:700;
      color:#111;
      margin:0 0 8px;
      line-height:1.3;
    ">Get 3 free AI contract analyses</h2>

    <p style="
      font-size:14px;
      color:#555;
      margin:0 0 1.25rem;
      line-height:1.55;
    ">Drop your email and we'll send you 3 free contract clause breakdowns — no credit card, no trial needed. Just answers.</p>

    <form id="hr-capture-form" onsubmit="hrSubmitForm(event)">
      <input
        type="email"
        id="hr-email-input"
        placeholder="your@email.com"
        required
        style="
          width:100%;
          padding:11px 14px;
          border:1.5px solid #ddd;
          border-radius:8px;
          font-size:15px;
          margin-bottom:10px;
          box-sizing:border-box;
          outline:none;
          transition:border-color .15s;
        "
        onfocus="this.style.borderColor='#2563eb'"
        onblur="this.style.borderColor='#ddd'"
      />
      <button type="submit" id="hr-submit-btn" style="
        width:100%;
        padding:12px;
        background:#2563eb;
        color:#fff;
        border:none;
        border-radius:8px;
        font-size:15px;
        font-weight:600;
        cursor:pointer;
        transition:background .15s;
      "
        onmouseover="this.style.background='#1d4ed8'"
        onmouseout="this.style.background='#2563eb'"
      >Send me the free analyses →</button>
    </form>

    <div id="hr-success" style="display:none;text-align:center;padding:1rem 0">
      <div style="font-size:36px;margin-bottom:8px">✅</div>
      <p style="font-size:15px;font-weight:600;color:#111;margin:0 0 4px">You're in!</p>
      <p style="font-size:13px;color:#555;margin:0">Check your inbox — your free analyses are on the way.</p>
    </div>

    <p style="font-size:11px;color:#bbb;text-align:center;margin:12px 0 0;">
      No spam. Unsubscribe anytime.
    </p>
  </div>
</div>

<script>
(function() {

  var KIT_FORM_ID    = '9342446';
  var KIT_ACCOUNT_ID = 'e544b59606';

  var shown   = false;
  var overlay = document.getElementById('hr-popup-overlay');

  function hrShowPopup() {
    if (shown || sessionStorage.getItem('hr_popup_dismissed')) return;
    shown = true;
    overlay.style.display = 'flex';
  }

  // Trigger 1: 30 seconds on page
  setTimeout(hrShowPopup, 30000);

  // Trigger 2: 60% scroll depth
  window.addEventListener('scroll', function() {
    var pct = (window.scrollY / (document.body.scrollHeight - window.innerHeight)) * 100;
    if (pct >= 60) hrShowPopup();
  }, { passive: true });

  window.hrClosePopup = function(e) {
    if (e.target === overlay) hrDismiss();
  };

  window.hrDismiss = function() {
    overlay.style.display = 'none';
    sessionStorage.setItem('hr_popup_dismissed', '1');
  };

  window.hrSubmitForm = function(e) {
    e.preventDefault();
    var email = document.getElementById('hr-email-input').value.trim();
    var btn   = document.getElementById('hr-submit-btn');

    btn.textContent = 'Sending...';
    btn.disabled = true;

    fetch('https://app.convertkit.com/forms/' + KIT_FORM_ID + '/subscriptions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email_address: email,
        api_key: KIT_ACCOUNT_ID
      })
    })
    .then(function(res) {
      document.getElementById('hr-capture-form').style.display = 'none';
      document.getElementById('hr-success').style.display = 'block';
      sessionStorage.setItem('hr_popup_dismissed', '1');
      setTimeout(function() { overlay.style.display = 'none'; }, 3000);
    })
    .catch(function() {
      document.getElementById('hr-capture-form').style.display = 'none';
      document.getElementById('hr-success').style.display = 'block';
      setTimeout(function() { overlay.style.display = 'none'; }, 3000);
    });
  };

})();
</script>
