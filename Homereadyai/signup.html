<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HomeReady AI — Create Account</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--orange:#E8793C;--orange-dark:#C4622A;--bg:#F7F4EF;--dark:#1C1812;--border:rgba(108,92,78,0.14);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;}
header{background:var(--dark);padding:0 2rem;display:flex;align-items:center;height:58px;}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-icon{width:32px;height:32px;background:var(--orange);border-radius:8px;display:flex;align-items:center;justify-content:center;}
.logo-icon svg{width:18px;height:18px;}
.logo-name{font-family:'Fraunces',serif;font-size:17px;font-weight:600;color:#fff;}
.logo-by{font-size:11px;color:rgba(255,255,255,0.35);margin-left:3px;}
.wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem;}
.card{background:#fff;border-radius:16px;border:1px solid var(--border);padding:2.5rem;width:100%;max-width:420px;}
.card h1{font-family:'Fraunces',serif;font-size:24px;font-weight:600;color:var(--dark);margin-bottom:6px;}
.card p{font-size:14px;color:#6B5C4E;margin-bottom:1.75rem;}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:16px;}
label{font-size:11px;font-weight:600;color:#A89888;text-transform:uppercase;letter-spacing:0.07em;}
input{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:9px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--dark);background:var(--bg);outline:none;transition:border-color 0.15s;}
input:focus{border-color:var(--orange);background:#fff;}
.btn{width:100%;padding:13px;background:var(--orange);color:#fff;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:background 0.2s;margin-top:4px;}
.btn:hover{background:var(--orange-dark);}
.btn:disabled{opacity:0.55;cursor:not-allowed;}
.error{background:#FEE;border:1px solid #FCC;border-radius:8px;padding:10px 14px;font-size:13px;color:#C00;margin-bottom:16px;display:none;}
.success{background:#E6F8F0;border:1px solid #9FE1CB;border-radius:8px;padding:10px 14px;font-size:13px;color:#0F6E56;margin-bottom:16px;display:none;}
.footer-link{text-align:center;margin-top:1.25rem;font-size:13px;color:#6B5C4E;}
.footer-link a{color:var(--orange);text-decoration:none;font-weight:500;}
footer{background:var(--dark);text-align:center;padding:1rem;font-size:11px;color:rgba(255,255,255,0.3);}
footer a{color:var(--orange);text-decoration:none;}
</style>
</head>
<body>
<header>
  <a class="logo" href="/">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
    </div>
    <span class="logo-name">HomeReady AI</span>
    <span class="logo-by">by Nestara</span>
  </a>
</header>
<div class="wrap">
  <div class="card">
    <h1>Create your account</h1>
    <p>Set up your HomeReady AI account to access all 4 tools.</p>
    <div class="error" id="error-msg"></div>
    <div class="success" id="success-msg"></div>
    <div class="fg"><label>Full name</label><input type="text" id="name" placeholder="Your full name" autocomplete="name"></div>
    <div class="fg"><label>Email</label><input type="email" id="email" placeholder="you@email.com" autocomplete="email"></div>
    <div class="fg"><label>Password</label><input type="password" id="password" placeholder="At least 8 characters" autocomplete="new-password"></div>
    <button class="btn" id="signup-btn" onclick="handleSignup()">Create account</button>
    <div class="footer-link">Already have an account? <a href="/login.html">Sign in</a></div>
  </div>
</div>
<footer>HomeReady AI · <a href="#">Nestara</a> · Not legal advice · <a href="mailto:nestara@nestarahq.com">nestara@nestarahq.com</a></footer>
<script>
const _supabaseClient = window.supabase.createClient('https://wegjxjvoobdixwfhhsaj.supabase.co', 'sb_publishable_Q7hbvRvd7-ogbttBSR3B0A_qxd2iqY7');
async function handleSignup() {
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('signup-btn');
  const err = document.getElementById('error-msg');
  const suc = document.getElementById('success-msg');
  err.style.display = 'none'; suc.style.display = 'none';
  if (!name || !email || !password) { showError('Please fill in all fields.'); return; }
  if (password.length < 8) { showError('Password must be at least 8 characters.'); return; }
  btn.disabled = true; btn.textContent = 'Creating account...';
  const { error } = await _supabaseClient.auth.signUp({ email, password, options: { data: { full_name: name } } });
  if (error) { showError(error.message); btn.disabled = false; btn.textContent = 'Create account'; return; }
  suc.textContent = 'Account created! Check your email to confirm, then sign in.';
  suc.style.display = 'block';
  btn.textContent = 'Account created!';
  setTimeout(() => window.location.href = '/login.html', 3000);
}
function showError(msg) { const e = document.getElementById('error-msg'); e.textContent = msg; e.style.display = 'block'; }
</script>
</body>
</html>
